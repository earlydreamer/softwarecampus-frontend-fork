# ------------------------------------------------------------------------------
# [Frontend Nginx Configuration]
#
# 목적: React SPA 서빙 + 백엔드 API 리버스 프록시
# 주요 기능:
#   1. SPA 라우팅 지원: 모든 요청을 index.html로 리다이렉트하여 React Router가 URL을 처리할 수 있게 함
#   2. API 프록시: /api, /admin 요청을 백엔드 컨테이너(softcampus-backend)로 전달
#   3. 정적 자산 최적화: Gzip 압축 및 브라우저 캐싱 정책 적용
#   4. 보안 및 성능: 불필요한 헤더 제거 및 효율적인 파일 서빙
#
# 변경 이유 (2026-03-20):
#   - 외부 Nginx 리버스프록시 컨테이너 제거 (Cloudflare Tunnel 직접 연결로 전환)
#   - Cloudflare Tunnel 대시보드에서 단일 호스트명(softwarecampus.*)으로
#     path 기반 다중 라우팅이 불가하여 이 Nginx가 라우팅 역할 겸임
# ------------------------------------------------------------------------------

server {
    listen 80;
    server_name localhost;

    # 정적 파일 루트 디렉토리 (Dockerfile에서 복사된 빌드 결과물 위치)
    root /usr/share/nginx/html;
    index index.html;

    # Docker 내부 DNS resolver (컨테이너명 런타임 해석용)
    # 백엔드 컨테이너가 나중에 뜨더라도 Nginx가 재시작 없이 연결 가능하게 함
    resolver 127.0.0.11 valid=30s;

    # --------------------------------------------------------------------------
    # [Gzip 압축 설정]
    # 전송 데이터 크기를 줄여 로딩 속도 향상
    # --------------------------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --------------------------------------------------------------------------
    # [보안 헤더 설정]
    # 일반적인 웹 취약점으로부터 애플리케이션을 보호합니다.
    # --------------------------------------------------------------------------
    # 클릭재킹 방지: iframe 내 페이지 로드 차단
    add_header X-Frame-Options "SAMEORIGIN" always;

    # MIME 스니핑 방지: 브라우저가 Content-Type을 임의로 해석하지 못하도록 차단
    add_header X-Content-Type-Options "nosniff" always;

    # XSS 필터 활성화 (레거시 브라우저 지원)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer 정보 제어: 외부 사이트로 전송되는 정보 최소화
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --------------------------------------------------------------------------
    # [API 프록시 설정]
    # /api, /admin 요청을 백엔드 컨테이너로 전달
    # softcampus-backend: docker-compose 네트워크(softcampus-network) 내 컨테이너명
    # --------------------------------------------------------------------------
    location /api {
        set $backend http://softcampus-backend:8082;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin {
        set $backend http://softcampus-backend:8082;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------------------------
    # [SPA 라우팅 설정]
    # 사용자가 직접 URL을 입력하거나 새로고침 했을 때 404 에러가 나지 않도록
    # 모든 경로 요청에 대해 index.html을 반환 (History API Fallback)
    # --------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --------------------------------------------------------------------------
    # [정적 자산 캐시 제어]
    # 빌드 시 생성된 해시 파일명(assets/)은 내용이 변하지 않는 한 영구 캐싱 가능
    # --------------------------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # --------------------------------------------------------------------------
    # [에러 페이지 처리]
    # 서버 에러 발생 시 사용자에게 보여줄 페이지 설정
    # --------------------------------------------------------------------------
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
