# ------------------------------------------------------------------------------
# [Frontend Nginx Configuration]
#
# 목적: React Single Page Application (SPA) 서빙을 위한 Nginx 설정
# 주요 기능:
#   1. SPA 라우팅 지원: 모든 요청을 index.html로 리다이렉트하여 React Router가 URL을 처리할 수 있게 함
#   2. 정적 자산 최적화: Gzip 압축 및 브라우저 캐싱 정책 적용
#   3. 보안 및 성능: 불필요한 헤더 제거 및 효율적인 파일 서빙
# ------------------------------------------------------------------------------

server {
    listen 80;
    server_name localhost;

    # 정적 파일 루트 디렉토리 (Dockerfile에서 복사된 빌드 결과물 위치)
    root /usr/share/nginx/html;
    index index.html;

    # --------------------------------------------------------------------------
    # [Gzip 압축 설정]
    # 전송 데이터 크기를 줄여 로딩 속도 향상
    # --------------------------------------------------------------------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --------------------------------------------------------------------------
    # [SPA 라우팅 설정]
    # 사용자가 직접 URL을 입력하거나 새로고침 했을 때 404 에러가 나지 않도록
    # 모든 경로 요청에 대해 index.html을 반환 (History API Fallback)
    # --------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --------------------------------------------------------------------------
    # [정적 자산 캐시 제어]
    # 빌드 시 생성된 해시 파일명(assets/)은 내용이 변하지 않는 한 영구 캐싱 가능
    # --------------------------------------------------------------------------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # --------------------------------------------------------------------------
    # [에러 페이지 처리]
    # 서버 에러 발생 시 사용자에게 보여줄 페이지 설정
    # --------------------------------------------------------------------------
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
