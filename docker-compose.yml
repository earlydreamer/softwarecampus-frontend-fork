version: '3.8'

services:
  frontend:
    image: app:latest
    container_name: softcampus-frontend
    restart: unless-stopped
    ports:
      - "18080:80"
    networks:
      - softcampus-network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  softcampus-network:
    name: softcampus-network
    driver: bridge
