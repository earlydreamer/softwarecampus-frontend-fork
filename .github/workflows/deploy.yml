name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Create .env file
      run: |
        echo "${{ secrets.FRONTEND_ENV }}" > .env

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      run: |
        docker build -f docker/frontend/Dockerfile -t app:latest .

    - name: Save Docker Image
      run: |
        docker save app:latest | gzip > app.tar.gz

    - name: Copy Image to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "app.tar.gz"
        target: "/home/${{ secrets.EC2_USERNAME }}"

    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 변수 정의
          IMAGE_NAME="app:latest"
          CONTAINER_NAME="softcampus-frontend"
          BACKUP_CONTAINER_NAME="softcampus-frontend-backup"
          PORT=10080
          NETWORK_NAME="softcampus-network"

          echo "Loading new image..."
          gunzip -c app.tar.gz | docker load

          echo "Managing containers..."
          
          # 0. 네트워크 생성 (없으면 생성)
          docker network create $NETWORK_NAME || true
          
          # 1. 기존 백업 컨테이너가 있다면 제거
          docker rm -f $BACKUP_CONTAINER_NAME || true
          
          # 2. 현재 실행 중인 컨테이너를 백업으로 이름 변경 (존재하는 경우)
          if [ "$(docker ps -aq -f name=^/${CONTAINER_NAME}$)" ]; then
            docker stop $CONTAINER_NAME || true
            docker rename $CONTAINER_NAME $BACKUP_CONTAINER_NAME
          fi

          echo "Starting new container..."
          docker run -d --name $CONTAINER_NAME --network $NETWORK_NAME -p $PORT:80 $IMAGE_NAME

          echo "Verifying deployment..."
          sleep 10
          if curl -f http://localhost:$PORT > /dev/null 2>&1; then
            echo "Deployment successful!"
            # 이미지 파일 정리
            rm app.tar.gz
            # 백업 컨테이너 정리 (선택 사항: 수동 검사를 위해 유지하거나 제거)
            # docker rm -f $BACKUP_CONTAINER_NAME || true
          else
            echo "Deployment failed! Rolling back..."
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true
            
            if [ "$(docker ps -aq -f name=^/${BACKUP_CONTAINER_NAME}$)" ]; then
              echo "Restoring backup container..."
              docker rename $BACKUP_CONTAINER_NAME $CONTAINER_NAME
              docker start $CONTAINER_NAME
            else
              echo "No backup container found. System is down."
              exit 1
            fi
            exit 1
          fi
