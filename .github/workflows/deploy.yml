# ==============================================================================
# [GitHub Actions - NAS 배포 워크플로우]
#
# 목적: React 프론트엔드 애플리케이션을 Docker 컨테이너로 빌드하고 NAS에 배포
# 트리거: main 브랜치에 푸시될 때 자동 실행
# 주요 기능:
#   - 환경변수 주입 및 Docker 이미지 빌드
#   - Cloudflare Zero Trust SSH Tunnel을 통해 NAS로 이미지 전송 및 배포
#   - Health Check 및 자동 롤백
#
# 변경 이유 (2026-03-20):
#   - 인프라가 AWS EC2 → NAS 온프레미스 + Cloudflare Tunnel로 전환
#   - appleboy/scp-action, appleboy/ssh-action → cloudflared ProxyCommand 기반으로 교체
# ==============================================================================
name: Deploy to NAS

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Synology NAS 경로 분리:
      #   SSH shell → /volume1/docker/... (실제 파일시스템 경로)
      #   SCP(SFTP) → /docker/...        (공유 폴더 기준 가상 루트, /volume1 없음)
      # secrets.DEPLOY_BASE_PATH     예: /volume1/docker/softwarecampus  (SSH용)
      # secrets.DEPLOY_BASE_PATH_SCP 예: /docker/softwarecampus          (SCP용)
      DEPLOY_DIR:     "${{ secrets.DEPLOY_BASE_PATH }}/softwarecampus-frontend"
      SCP_DEPLOY_DIR: "${{ secrets.DEPLOY_BASE_PATH_SCP }}/softwarecampus-frontend"
      # Cloudflare Zero Trust SSH 인증 (Service Token)
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

    steps:
    # --------------------------------------------------------------------------
    # 1. 소스 코드 체크아웃
    # --------------------------------------------------------------------------
    - name: Checkout code
      uses: actions/checkout@v4

    # --------------------------------------------------------------------------
    # 2. 환경변수 파일 생성
    # Vite는 빌드 시점에 .env 파일을 읽어 환경변수를 정적 파일에 포함시킵니다.
    # --------------------------------------------------------------------------
    - name: Create .env file
      env:
        FRONTEND_ENV: ${{ secrets.FRONTEND_ENV }}
      run: |
        if [ -z "$FRONTEND_ENV" ]; then
          echo "Error: secrets.FRONTEND_ENV is missing or empty." >&2
          exit 1
        fi
        printf '%s\n' "$FRONTEND_ENV" > .env

    # --------------------------------------------------------------------------
    # 3. Docker Buildx 설정
    # --------------------------------------------------------------------------
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # --------------------------------------------------------------------------
    # 4. Docker 이미지 빌드
    # Multi-stage Dockerfile: Node.js 빌드 → Nginx 서빙
    # --------------------------------------------------------------------------
    - name: Build Docker Image
      run: |
        docker build -f docker/frontend/Dockerfile -t app:latest .

    # --------------------------------------------------------------------------
    # 5. Docker 이미지 저장
    # 빌드된 이미지를 .tar.gz로 압축 (외부 레지스트리 없이 직접 전송)
    # --------------------------------------------------------------------------
    - name: Save Docker Image
      run: |
        docker save app:latest | gzip > app.tar.gz

    # --------------------------------------------------------------------------
    # 6. cloudflared 설치
    # Cloudflare Zero Trust SSH Tunnel ProxyCommand에 필요
    # --------------------------------------------------------------------------
    - name: Install cloudflared
      run: |
        curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
          -o cloudflared.deb
        sudo dpkg -i cloudflared.deb

    # --------------------------------------------------------------------------
    # 7. SSH 설정
    # ~/.ssh/config에 cloudflared ProxyCommand 등록
    # --------------------------------------------------------------------------
    - name: Configure SSH
      run: |
        mkdir -p ~/.ssh
        printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        cat >> ~/.ssh/config << EOF
        Host ${{ secrets.EC2_HOST }}
          ProxyCommand cloudflared access ssh --hostname %h --id ${{ secrets.CF_ACCESS_CLIENT_ID }} --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          IdentityFile ~/.ssh/deploy_key
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
        EOF

    # --------------------------------------------------------------------------
    # 8. NAS로 파일 전송 (SCP)
    # SSH로 디렉토리를 먼저 생성(실제 경로)한 뒤, SCP는 SFTP 가상 경로로 전송
    # --------------------------------------------------------------------------
    - name: Copy files to server
      run: |
        ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} \
          "mkdir -p ${{ env.DEPLOY_DIR }}"
        scp app.tar.gz \
          ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:${{ env.SCP_DEPLOY_DIR }}/app.tar.gz
        scp docker-compose.yml \
          ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:${{ env.SCP_DEPLOY_DIR }}/docker-compose.yml

    # --------------------------------------------------------------------------
    # 9. NAS에서 배포 실행 (SSH)
    #   1) 이미지 로드
    #   2) 기존 컨테이너 백업
    #   3) 새 컨테이너 시작
    #   4) Health Check
    #   5) 성공 시 정리 / 실패 시 롤백
    # --------------------------------------------------------------------------
    - name: Deploy on server
      run: |
        ssh ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << ENDSSH
        set -euo pipefail
        DEPLOY_DIR="${{ env.DEPLOY_DIR }}"
        COMPOSE_FILE="\$DEPLOY_DIR/docker-compose.yml"
        IMAGE_FILE="\$DEPLOY_DIR/app.tar.gz"

        # ------------------------------------------------------------------
        # Step 1: Docker 이미지 로드
        # ------------------------------------------------------------------
        echo "Loading new image..."
        if ! gunzip -c \$IMAGE_FILE | docker load; then
          echo "Error: Failed to load Docker image" >&2
          exit 1
        fi

        # ------------------------------------------------------------------
        # Step 2: Docker 네트워크 생성 (이미 존재하면 무시)
        # ------------------------------------------------------------------
        docker network create softcampus-network || true

        # ------------------------------------------------------------------
        # Step 3: 기존 컨테이너 백업
        # ------------------------------------------------------------------
        echo "Managing containers..."
        docker rm -f softcampus-frontend-backup-old || true
        docker rm -f softcampus-frontend-backup || true
        if docker ps -q -f name=softcampus-frontend > /dev/null 2>&1; then
          docker rename softcampus-frontend softcampus-frontend-backup || true
        fi

        # ------------------------------------------------------------------
        # Step 4: 새 컨테이너 시작
        # ------------------------------------------------------------------
        echo "Starting services with docker compose..."
        docker compose -f \$COMPOSE_FILE up -d

        # ------------------------------------------------------------------
        # Step 5: Health Check
        # ------------------------------------------------------------------
        echo "Verifying deployment..."
        sleep 10
        if curl -f http://localhost:18080 > /dev/null 2>&1; then
          echo "Deployment successful!"
          rm -f \$IMAGE_FILE
          docker rm -f softcampus-frontend-backup || true
        else
          # ------------------------------------------------------------------
          # Step 6: 롤백
          # ------------------------------------------------------------------
          echo "Deployment failed! Rolling back..."
          docker compose -f \$COMPOSE_FILE down || true
          if docker ps -aq -f name=softcampus-frontend-backup > /dev/null 2>&1; then
            echo "Restoring backup container..."
            docker rename softcampus-frontend-backup softcampus-frontend
            docker start softcampus-frontend
          else
            echo "No backup container found. System is down."
            exit 1
          fi
          exit 1
        fi
        ENDSSH
